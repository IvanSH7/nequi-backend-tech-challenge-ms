version: '3.8'

services:
  localstack:
    image: localstack/localstack:latest
    container_name: nequi-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,sqs
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - ./LocalStackEnvironment.sh:/etc/localstack/init/ready.d/init-aws.sh
    networks:
      - nequi-network
    healthcheck:
      test: [ "CMD", "awslocal", "sqs", "get-queue-url", "--queue-name", "release-tickets-queue-dev" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend-app:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    container_name: nequi-backend-app
    ports:
      - "9090:9090"
    environment:
      - SPRING_PROFILE=local
      - TIME_TO_PAY=120
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DYNAMO_ENDPOINT=http://localstack:4566
      - AWS_SQS_ENDPOINT=http://localstack:4566
      - AWS_SQS_PURCHASE_QUEUE_URL=http://localstack:4566/000000000000/purchase-queue-dev.fifo
      - AWS_SQS_RELEASE_QUEUE_URL=http://localstack:4566/000000000000/release-tickets-queue-dev
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - nequi-network

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: nequi-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - nequi-network

networks:
  nequi-network:
    driver: bridge